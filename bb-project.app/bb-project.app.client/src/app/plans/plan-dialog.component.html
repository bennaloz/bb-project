<h2 mat-dialog-title>{{ data.plan ? 'Edit Plan' : 'Add Plan' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" style="display:flex;flex-direction:column;gap:12px;min-width:280px">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>
    <mat-checkbox formControlName="isActive">Active</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
