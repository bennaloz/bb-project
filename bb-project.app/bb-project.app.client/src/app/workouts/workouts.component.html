<div style="display:flex;align-items:center;margin-bottom:16px;gap:12px">
  <button mat-icon-button (click)="backToPlans()" title="Back to Plans">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h2 style="margin:0">{{ planName || ('Plan ' + planId) }} — Workouts</h2>
  <span style="flex:1 1 auto"></span>
  <button mat-raised-button color="primary" (click)="openAdd()">
    <mat-icon>add</mat-icon> Add Workout
  </button>
</div>

<p *ngIf="workouts.length === 0" style="color:#888;font-style:italic">No workouts yet. Click <em>Add Workout</em> to create one.</p>

<table *ngIf="workouts.length > 0" mat-table [dataSource]="workouts" style="width:100%">
  <ng-container matColumnDef="order">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let w">{{ w.order }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let w">{{ w.name }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let w">
      <button mat-icon-button color="primary" title="Edit" (click)="openEdit(w)">
        <mat-icon>edit</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
