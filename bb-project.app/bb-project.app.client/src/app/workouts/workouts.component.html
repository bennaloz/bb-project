<div style="display:flex;align-items:center;margin-bottom:16px;gap:12px">
  <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" (onClick)="backToPlans()" pTooltip="Back to Plans" />
  <h2 style="margin:0">{{ planName || ('Plan ' + planId) }} — Workouts</h2>
  <span style="flex:1 1 auto"></span>
  <p-button label="Add Workout" icon="pi pi-plus" (onClick)="openAdd()" />
</div>

<p *ngIf="workouts.length === 0" class="empty-msg">No workouts yet. Click <em>Add Workout</em> to create one.</p>

<p-table *ngIf="workouts.length > 0" [value]="workouts" styleClass="p-datatable-striped">
  <ng-template pTemplate="header">
    <tr>
      <th style="width:60px">#</th>
      <th>Name</th>
      <th style="width:80px"></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-w>
    <tr>
      <td>{{ w.order }}</td>
      <td>{{ w.name }}</td>
      <td class="actions-col">
        <p-button
          icon="pi pi-pencil"
          severity="secondary"
          [rounded]="true"
          [text]="true"
          size="small"
          pTooltip="Edit"
          (onClick)="openEdit(w)"
        />
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Workout Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="editingWorkout ? 'Edit Workout' : 'Add Workout'"
  [modal]="true"
  [style]="{width:'400px'}"
  [draggable]="false"
>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label for="wName">Name</label>
      <input id="wName" pInputText formControlName="name" style="width:100%" />
      <small class="error" *ngIf="form.get('name')?.invalid && form.get('name')?.dirty">
        Name is required
      </small>
    </div>
    <div class="field">
      <label for="wOrder">Order (day)</label>
      <input id="wOrder" pInputText type="number" formControlName="order" style="width:100%" />
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="submit()" [disabled]="form.invalid" />
  </ng-template>
</p-dialog>
