<mat-toolbar color="primary">
  <span>Workouts for Plan {{ planId }}</span>
  <span style="flex:1 1 auto"></span>
  <button mat-icon-button (click)="openAdd()" title="Add Workout">
    <mat-icon>add</mat-icon>
  </button>
</mat-toolbar>

<table mat-table [dataSource]="workouts" style="width:100%">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let w">{{ w.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let w">{{ w.name }}</td>
  </ng-container>

  <ng-container matColumnDef="order">
    <th mat-header-cell *matHeaderCellDef>Order</th>
    <td mat-cell *matCellDef="let w">{{ w.order }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let w">
      <button mat-button color="primary" (click)="openEdit(w)">Edit</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
