<mat-toolbar color="primary">
  <span>Workout History</span>
</mat-toolbar>

<table mat-table [dataSource]="history" style="width:100%">
  <ng-container matColumnDef="userId">
    <th mat-header-cell *matHeaderCellDef>User</th>
    <td mat-cell *matCellDef="let h">{{ h.userId }}</td>
  </ng-container>

  <ng-container matColumnDef="workoutId">
    <th mat-header-cell *matHeaderCellDef>Workout ID</th>
    <td mat-cell *matCellDef="let h">{{ h.workoutId }}</td>
  </ng-container>

  <ng-container matColumnDef="startDate">
    <th mat-header-cell *matHeaderCellDef>Start</th>
    <td mat-cell *matCellDef="let h">{{ h.startDate }}</td>
  </ng-container>

  <ng-container matColumnDef="endDate">
    <th mat-header-cell *matHeaderCellDef>End</th>
    <td mat-cell *matCellDef="let h">{{ h.endDate }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
