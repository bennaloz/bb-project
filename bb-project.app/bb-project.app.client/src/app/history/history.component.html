<div class="page-header">
  <h2>Workout History</h2>
</div>

<p *ngIf="history.length === 0" class="empty-msg">No workout history yet.</p>

<p-table *ngIf="history.length > 0" [value]="history" styleClass="p-datatable-striped">
  <ng-template pTemplate="header">
    <tr>
      <th>User</th>
      <th>Workout ID</th>
      <th>Start</th>
      <th>End</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-h>
    <tr>
      <td>{{ h.userId }}</td>
      <td>{{ h.workoutId }}</td>
      <td>{{ h.startDate }}</td>
      <td>{{ h.endDate }}</td>
    </tr>
  </ng-template>
</p-table>
