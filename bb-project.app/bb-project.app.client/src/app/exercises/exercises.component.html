<div class="page-header">
  <h2>Exercise Definitions</h2>
  <p-button label="New Exercise" icon="pi pi-plus" (onClick)="openAdd()" />
</div>

<p *ngIf="exercises.length === 0" class="empty-msg">No exercises yet. Click <em>New Exercise</em> to create one.</p>

<p-table *ngIf="exercises.length > 0" [value]="exercises" styleClass="p-datatable-striped">
  <ng-template pTemplate="header">
    <tr>
      <th style="width:60px">ID</th>
      <th>Name</th>
      <th style="width:100px">Type</th>
      <th>Muscles</th>
      <th style="width:80px"></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-e>
    <tr>
      <td>{{ e.id }}</td>
      <td>{{ e.name }}</td>
      <td>{{ typeName(e.type) }}</td>
      <td>{{ muscleNames(e.involvedMuscles) }}</td>
      <td class="actions-col">
        <p-button
          icon="pi pi-pencil"
          severity="secondary"
          [rounded]="true"
          [text]="true"
          size="small"
          pTooltip="Edit"
          (onClick)="openEdit(e)"
        />
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Exercise Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="editingExercise ? 'Edit Exercise' : 'New Exercise'"
  [modal]="true"
  [style]="{width:'440px'}"
  [draggable]="false"
>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label for="exName">Name</label>
      <input id="exName" pInputText formControlName="name" style="width:100%" />
      <small class="error" *ngIf="form.get('name')?.invalid && form.get('name')?.dirty">
        Name is required
      </small>
    </div>
    <div class="field">
      <label for="exType">Type</label>
      <p-select
        id="exType"
        [options]="exerciseTypes"
        formControlName="type"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full"
        style="width:100%"
      />
    </div>
    <div class="field">
      <label for="exMuscles">Involved Muscles</label>
      <p-multiselect
        id="exMuscles"
        [options]="muscleOptions"
        formControlName="involvedMuscles"
        optionLabel="label"
        optionValue="value"
        placeholder="Select muscles"
        style="width:100%"
        styleClass="w-full"
      />
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="submit()" [disabled]="form.invalid" />
  </ng-template>
</p-dialog>
