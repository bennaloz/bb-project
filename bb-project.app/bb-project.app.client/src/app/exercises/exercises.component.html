<mat-toolbar color="primary">
  <span>Exercise Definitions</span>
  <span style="flex:1 1 auto"></span>
  <button mat-icon-button (click)="openAdd()" title="Add Exercise">
    <mat-icon>add</mat-icon>
  </button>
</mat-toolbar>

<table mat-table [dataSource]="exercises" style="width:100%">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let e">{{ e.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let e">{{ e.name }}</td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let e">{{ typeName(e.type) }}</td>
  </ng-container>

  <ng-container matColumnDef="involvedMuscles">
    <th mat-header-cell *matHeaderCellDef>Muscles</th>
    <td mat-cell *matCellDef="let e">{{ muscleNames(e.involvedMuscles) }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let e">
      <button mat-button color="primary" (click)="openEdit(e)">Edit</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
