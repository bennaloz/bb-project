name: Build MAUI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android android wasm-tools-net8

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK
        run: dotnet build bb-project.Client.MAUI/bb-project.Client.MAUI.csproj -f net8.0-android -c Release /p:CheckEolTargetFrameworks=false

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bb-project.Client.MAUI/bin/Release/net8.0-android/**/*.apk

  ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios android wasm-tools-net8

      - name: Build iOS (unsigned)
        run: dotnet build bb-project.Client.MAUI/bb-project.Client.MAUI.csproj -f net8.0-ios -c Release /p:RuntimeIdentifier=ios-arm64 /p:CodesignKey="" /p:CodesignProvision="" /p:CheckEolTargetFrameworks=false

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: bb-project.Client.MAUI/bin/Release/net8.0-ios/
