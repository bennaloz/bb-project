name: Build Web API

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore bb-project.app/bb-project.app.sln

      - name: Build
        run: dotnet build bb-project.app/bb-project.app.sln --configuration Release --no-restore

      - name: Test (skip integration tests)
        run: dotnet test bb-project.app/bb-project.app.sln --configuration Release --no-build --filter "TestCategory!=Integration"
