name: Deploy Angular

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-test:
    name: Deploy to TEST
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps (TEST)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MOSS_022988E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'bb-project.app/bb-project.app.client'
          output_location: 'dist/bb-project.app.client/browser'
          skip_app_build: false
          app_build_command: 'npm run build -- --configuration test'

  deploy-prod:
    name: Deploy to PROD
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps (PROD)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MOSS_022988E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'bb-project.app/bb-project.app.client'
          output_location: 'dist/bb-project.app.client/browser'
          skip_app_build: false
