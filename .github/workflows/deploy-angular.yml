name: Deploy Angular

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-test:
    name: Deploy to TEST
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bb-project.app/bb-project.app.client/package-lock.json

      - name: Install dependencies
        working-directory: bb-project.app/bb-project.app.client
        run: npm ci

      - name: Build
        working-directory: bb-project.app/bb-project.app.client
        run: npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps (TEST)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MOSS_022988E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'bb-project.app/bb-project.app.client'
          output_location: 'dist/bb-project.app.client/browser'
          skip_app_build: true

  deploy-prod:
    name: Deploy to PROD
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bb-project.app/bb-project.app.client/package-lock.json

      - name: Install dependencies
        working-directory: bb-project.app/bb-project.app.client
        run: npm ci

      - name: Build
        working-directory: bb-project.app/bb-project.app.client
        run: npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps (PROD)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MOSS_022988E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'bb-project.app/bb-project.app.client'
          output_location: 'dist/bb-project.app.client/browser'
          skip_app_build: true
