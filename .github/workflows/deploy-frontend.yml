name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bb-project.app/bb-project.app.client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bb-project.app/bb-project.app.client

      - name: Build Angular app (production)
        run: npx ng build --configuration production
        working-directory: bb-project.app/bb-project.app.client

      - name: Deploy to Azure Static Web Apps (Production)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_PEBBLE_0F0DA8203 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "bb-project.app/bb-project.app.client"
          output_location: "dist/bb-project.app.client/browser"
          skip_app_build: true

  deploy-test:
    name: Deploy to Test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bb-project.app/bb-project.app.client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bb-project.app/bb-project.app.client

      - name: Build Angular app (development)
        run: npx ng build --configuration development
        working-directory: bb-project.app/bb-project.app.client

      - name: Deploy to Azure Static Web Apps (Test)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MOSS_022988E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "bb-project.app/bb-project.app.client"
          output_location: "dist/bb-project.app.client/browser"
          skip_app_build: true
