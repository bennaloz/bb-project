name: One-Shot Repository Cleanup

# This workflow runs once to:
# 1. Merge main into develop to align it with the latest changes
# 2. Delete all stale copilot/* branches

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Merge main into develop and delete stale branches
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          git fetch origin main develop
          git checkout develop
          git merge origin/main -m "Merge main into develop to align with latest changes" || true

          # Resolve conflicts by taking main's versions for the known conflicting files
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Resolving conflicts by taking main's versions..."
            git diff --name-only --diff-filter=U | xargs -I{} git checkout origin/main -- {}
            git add .
            git commit --no-edit -m "Merge main into develop to align with latest changes (conflicts resolved)"
          fi

          git push origin develop

      - name: Delete stale copilot branches
        run: |
          stale_branches=(
            "copilot/fix-android-manifest-path"
            "copilot/fix-build-maui-yml"
            "copilot/fix-build-maui-yml-errors"
            "copilot/fix-build-workflows"
            "copilot/fix-ci-cd-workflows"
            "copilot/fix-github-actions-workflows"
            "copilot/fix-maui-icons-android"
            "copilot/fix-workflow-issues-cleanup"
            "copilot/remove-bin-obj-tracking"
            "copilot/remove-old-branches"
            "copilot/rewrite-github-actions-workflows"
            "copilot/update-ci-cd-workflows"
            "copilot/update-secret-handling-logic"
          )
          for branch in "${stale_branches[@]}"; do
            if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
              git push origin --delete "$branch"
              echo "Deleted branch: $branch"
            else
              echo "Branch not found (already deleted?): $branch"
            fi
          done
