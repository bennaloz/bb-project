name: Build MAUI Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore bb-project.Client.MAUI/bb-project.Client.MAUI.csproj

      - name: Build MAUI Android (Release)
        run: dotnet build bb-project.Client.MAUI/bb-project.Client.MAUI.csproj -f net8.0-android -c Release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bb-project.Client.MAUI/bin/Release/net8.0-android/**/*.apk
          if-no-files-found: error
