name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore bb-project.app/bb-project.app.sln

      - name: Build
        run: dotnet build bb-project.app/bb-project.app.sln --no-restore --configuration Release

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bb-project.app/bb-project.app.client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bb-project.app/bb-project.app.client

      - name: Build
        run: npm run build
        working-directory: bb-project.app/bb-project.app.client
